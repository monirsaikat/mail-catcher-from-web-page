<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sync Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="options">
      <h1>Sync Settings</h1>
      <p class="hint">Configure the endpoint that saved emails are POSTed to when you click "Sync All" in the popup.</p>

      <label for="endpoint">Endpoint URL</label>
      <input type="url" id="endpoint" placeholder="https://api.example.com/emails" />

      <label for="auth-header">Authorization header value <span class="optional">(optional)</span></label>
      <input type="text" id="auth-header" placeholder="Bearer xxxxxxxxxxxx" />

      <button id="save-btn" class="btn btn-primary" type="button">Save</button>
      <span id="save-status" class="save-status" hidden>Saved &#10003;</span>
    </div>
    <script src="options.js"></script>
  </body>
</html>
