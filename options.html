<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sync Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="page">
      <div class="card">
        <div class="card-header">
          <span class="brand-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 6.5C3 5.67157 3.67157 5 4.5 5H19.5C20.3284 5 21 5.67157 21 6.5V17.5C21 18.3284 20.3284 19 19.5 19H4.5C3.67157 19 3 18.3284 3 17.5V6.5Z" stroke="white" stroke-width="1.6"/>
              <path d="M4 6.5L12 13L20 6.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <div>
            <h1>Sync Settings</h1>
            <p class="hint">Configure the endpoint that saved emails are POSTed to when you click "Sync All".</p>
          </div>
        </div>

        <div class="field">
          <label for="endpoint">Endpoint URL</label>
          <input type="url" id="endpoint" placeholder="https://api.example.com/emails" />
        </div>

        <div class="field">
          <label for="auth-header">Authorization header value <span class="optional">(optional)</span></label>
          <input type="text" id="auth-header" placeholder="Bearer xxxxxxxxxxxx" />
        </div>

        <div class="actions">
          <button id="save-btn" class="btn btn-primary" type="button">Save changes</button>
          <span id="save-status" class="save-status" hidden>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 12.5L9.5 17L19 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Saved
          </span>
        </div>
      </div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
