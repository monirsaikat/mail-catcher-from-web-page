<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Saved Emails</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="brand">
          <span class="brand-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 6.5C3 5.67157 3.67157 5 4.5 5H19.5C20.3284 5 21 5.67157 21 6.5V17.5C21 18.3284 20.3284 19 19.5 19H4.5C3.67157 19 3 18.3284 3 17.5V6.5Z" stroke="white" stroke-width="1.6"/>
              <path d="M4 6.5L12 13L20 6.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <div class="brand-text">
            <h1>Saved Emails</h1>
            <span class="brand-sub" id="header-count">0 collected</span>
          </div>
        </div>
        <button id="settings-btn" class="icon-btn" title="Settings" type="button">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 15.5C13.933 15.5 15.5 13.933 15.5 12C15.5 10.067 13.933 8.5 12 8.5C10.067 8.5 8.5 10.067 8.5 12C8.5 13.933 10.067 15.5 12 15.5Z" stroke="currentColor" stroke-width="1.6"/>
            <path d="M19.4 13.5C19.47 13 19.5 12.5 19.5 12C19.5 11.5 19.47 11 19.4 10.5L21.5 8.9L20 6.3L17.6 7.3C16.9 6.7 16.1 6.2 15.2 5.9L14.9 3.3H10.1L9.8 5.9C8.9 6.2 8.1 6.7 7.4 7.3L5 6.3L3.5 8.9L5.6 10.5C5.53 11 5.5 11.5 5.5 12C5.5 12.5 5.53 13 5.6 13.5L3.5 15.1L5 17.7L7.4 16.7C8.1 17.3 8.9 17.8 9.8 18.1L10.1 20.7H14.9L15.2 18.1C16.1 17.8 16.9 17.3 17.6 16.7L20 17.7L21.5 15.1L19.4 13.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </button>
      </header>

      <div id="toast" class="toast" hidden></div>

      <div id="empty-state" class="empty-state" hidden>
        <div class="empty-icon" aria-hidden="true">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 7.5C3 6.11929 4.11929 5 5.5 5H18.5C19.8807 5 21 6.11929 21 7.5V16.5C21 17.8807 19.8807 19 18.5 19H5.5C4.11929 19 3 17.8807 3 16.5V7.5Z" stroke="currentColor" stroke-width="1.4"/>
            <path d="M3.5 7L12 13.5L20.5 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="empty-title">No emails yet</p>
        <p class="hint">Click any highlighted email on a webpage to start collecting.</p>
      </div>

      <ul id="entry-list" class="entry-list"></ul>

      <footer class="app-footer">
        <span id="entry-count" class="entry-count">0 saved</span>
        <button id="sync-btn" class="btn btn-primary" type="button">
          <span class="btn-spinner" aria-hidden="true"></span>
          <span class="btn-label">Sync All</span>
        </button>
      </footer>
    </div>

    <template id="entry-template">
      <li class="entry">
        <div class="entry-avatar" aria-hidden="true"></div>
        <div class="entry-main">
          <div class="entry-title"></div>
          <div class="entry-email"></div>
          <div class="entry-note"></div>
        </div>
        <button class="entry-delete" title="Delete" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </li>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
